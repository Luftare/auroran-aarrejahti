services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  app:
    image: ${APP_IMAGE:-ghcr.io/OWNER/auroran-aarrejahti:latest}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://aarre:${POSTGRES_PASSWORD}@postgres:5432/aarre
      ORIGIN: https://${DOMAIN}
      PUBLIC_BASE_URL: https://${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command: postgres -c shared_buffers=128MB -c max_connections=20
    environment:
      POSTGRES_USER: aarre
      POSTGRES_DB: aarre
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aarre']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  caddy_data:
  caddy_config:
  pgdata:
